services:
  # PostgreSQL データベース
  db:
    image: postgres:17-alpine
    container_name: presence_board_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-presence_board}
      POSTGRES_USER: ${POSTGRES_USER:-presence_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-presence_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-presence_user} -d ${POSTGRES_DB:-presence_board}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django アプリケーション
  web:
    build: .
    container_name: presence_board_web
    restart: always
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
